version: 1
frontend:
  phases:
    preBuild:
      commands:
        - nvm install 20
        - nvm use 20
        - npm ci
    build:
      commands:
        - echo "MONGODB_URI=$MONGODB_URI" >> .env.production
        - echo "NEXT_PUBLIC_SITE_URL=$NEXT_PUBLIC_SITE_URL" >> .env.production
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
      - '!cache/**/*'
  cache:
    paths:
      - node_modules/**/*
      - .next/cache/**/*